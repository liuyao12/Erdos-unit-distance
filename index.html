<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cyclotomic Cut-and-Project Explorer</title>
  <style>
    :root {
      --bg: #f8f7f2;
      --ink: #171717;
      --muted: #6b6b68;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-border: rgba(20, 20, 20, 0.16);
      --blue: #2436d8;
      --orange: #f0a000;
      --orange-edge: #b56e00;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: grab;
      touch-action: none;
    }

    #stage.dragging {
      cursor: grabbing;
    }

    .toolbar {
      position: fixed;
      top: 16px;
      left: 16px;
      max-width: calc(100vw - 32px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
      user-select: none;
    }

    .select-wrap {
      height: 36px;
      min-width: 132px;
      display: flex;
      align-items: center;
      position: relative;
      padding: 0;
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      background: #ffffff;
    }

    .field-button {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 0;
      border-radius: 6px;
      padding: 0 9px 0 10px;
      background: transparent;
      color: #242424;
      font: 600 12px Inter, ui-sans-serif, system-ui, sans-serif;
      line-height: 1;
      cursor: pointer;
    }

    .field-button::after {
      content: "";
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #6b6b68;
    }

    .field-button:hover {
      background: #f0f0ec;
    }

    .field-button:focus-visible,
    .field-option:focus-visible {
      outline: 2px solid rgba(36, 54, 216, 0.4);
      outline-offset: 2px;
    }

    .field-options {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 5;
      min-width: 100%;
      display: none;
      gap: 2px;
      padding: 4px;
      background: #ffffff;
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }

    .field-options.open {
      display: grid;
    }

    .field-option {
      width: 100%;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      border: 0;
      border-radius: 4px;
      padding: 0 8px;
      background: transparent;
      color: #242424;
      font: 600 12px Inter, ui-sans-serif, system-ui, sans-serif;
      text-align: left;
      white-space: nowrap;
    }

    .field-option:hover,
    .field-option.selected {
      background: #f0f0ec;
    }

    .field-label strong,
    .field-heading strong {
      font-weight: 800;
    }

    .field-label sub,
    .field-heading sub {
      font-size: 72%;
      line-height: 0;
    }

    .field-heading {
      color: var(--ink);
      font-weight: 500;
    }

    .status {
      position: fixed;
      right: 16px;
      bottom: 16px;
      min-width: 450px;
      max-width: calc(100vw - 32px);
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      user-select: none;
    }

    .status strong {
      color: var(--ink);
      font-weight: 650;
    }

    .status-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .status-meta {
      min-width: 0;
    }

    .distance-race {
      display: grid;
      gap: 5px;
      margin: 7px 0 7px;
    }

    .race-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .race-heading strong {
      color: var(--ink);
      font-weight: 700;
    }

    .race-row {
      position: relative;
      display: grid;
      grid-template-columns: minmax(168px, 1fr) minmax(82px, 0.8fr) 58px;
      gap: 7px;
      align-items: center;
      min-height: 18px;
      padding: 2px 5px;
      font-variant-numeric: tabular-nums;
      border: 1px solid transparent;
      border-radius: 5px;
      cursor: pointer;
      transition:
        transform 320ms cubic-bezier(0.2, 0.9, 0.2, 1),
        opacity 220ms ease,
        background 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease;
      will-change: transform;
    }

    .race-row:hover {
      background: rgba(20, 20, 20, 0.035);
    }

    .race-row:focus-visible {
      outline: 2px solid rgba(36, 54, 216, 0.32);
      outline-offset: 2px;
    }

    .race-row.entering {
      opacity: 0;
      transform: translateY(8px) scale(0.985);
    }

    .race-row.selected {
      border-color: var(--race-color, #6f7f93);
      background: rgba(255, 255, 255, 0.72);
      box-shadow:
        inset 0 0 0 1px var(--race-color, #6f7f93),
        0 1px 6px rgba(20, 20, 20, 0.07);
    }

    .race-label {
      display: flex;
      align-items: baseline;
      gap: 7px;
      min-width: 0;
      overflow: hidden;
      color: var(--ink);
      font-size: 11px;
      font-weight: 650;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .race-exact {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .race-decimal {
      flex: 0 0 auto;
      color: var(--muted);
      font-weight: 600;
    }

    .race-track {
      height: 7px;
      overflow: hidden;
      background: rgba(20, 20, 20, 0.11);
      border-radius: 7px;
    }

    .race-fill {
      display: block;
      height: 100%;
      background: var(--race-color, #6f7f93);
      border-radius: 7px;
      transition: width 260ms cubic-bezier(0.2, 0.9, 0.2, 1), background-color 180ms ease;
    }

    .race-row.leader .race-fill {
      box-shadow: 0 0 0 1px rgba(20, 20, 20, 0.08);
    }

    .race-row.unit .race-label::after {
      content: "unit";
      padding: 1px 4px;
      border-radius: 4px;
      background: rgba(36, 54, 216, 0.08);
      color: var(--blue);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .race-count {
      justify-self: end;
      min-width: max-content;
      color: var(--ink);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.1;
      text-align: right;
      white-space: nowrap;
    }

    .race-note {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .shown-distance {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      min-width: 94px;
      max-width: 118px;
      margin: 0;
      padding: 5px 6px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(20, 20, 20, 0.09);
      border-radius: 5px;
      box-shadow: inset 2px 0 0 var(--race-color, #6f7f93);
      font-variant-numeric: tabular-nums;
    }

    .shown-distance.selected {
      border-color: rgba(20, 20, 20, 0.14);
    }

    .shown-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .shown-distance .race-label {
      justify-content: flex-end;
      gap: 4px;
      max-width: 100%;
      font-size: 10px;
      text-align: right;
    }

    .shown-distance .race-decimal {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .race-row,
      .race-fill {
        transition: none;
      }
    }

    .point-tooltip {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 3;
      max-width: min(360px, calc(100vw - 24px));
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.1);
      color: var(--ink);
      opacity: 0;
      pointer-events: none;
      transform: translate(-999px, -999px);
      transition: opacity 80ms ease;
      user-select: none;
      visibility: hidden;
    }

    .point-tooltip.visible {
      opacity: 1;
      visibility: visible;
    }

    .tooltip-field {
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      line-height: 1.15;
    }

    .tooltip-expression {
      font: 600 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      overflow-wrap: anywhere;
    }

    .tooltip-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      line-height: 1.15;
    }

    button {
      width: 36px;
      height: 36px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      background: #ffffff;
      color: #242424;
      padding: 0;
      cursor: pointer;
    }

    button:hover {
      background: #f0f0ec;
    }

    button.active {
      color: #ffffff;
      background: #22242a;
      border-color: #22242a;
    }

    button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .slider-wrap {
      height: 36px;
      flex: 1 1 clamp(220px, 34vw, 380px);
      min-width: 210px;
      max-width: 430px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      background: #ffffff;
    }

    .slider-wrap span {
      min-width: 42px;
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .slider-wrap span sub {
      font-size: 72%;
      line-height: 0;
    }

    .slider-wrap.full-ring {
      flex: 0 0 auto;
      min-width: 82px;
    }

    .slider-wrap.full-ring span {
      min-width: auto;
      color: var(--ink);
      font-weight: 650;
    }

    .slider-wrap.full-ring input[type="range"] {
      display: none;
    }

    input[type="range"] {
      width: auto;
      min-width: 0;
      flex: 1 1 auto;
      accent-color: #22242a;
    }

    @media (max-width: 720px) {
      .toolbar {
        right: 12px;
        left: 12px;
        top: 12px;
        flex-wrap: wrap;
      }

      .slider-wrap {
        flex-basis: 220px;
        max-width: none;
      }

      .status {
        left: 12px;
        right: 12px;
        bottom: 12px;
        min-width: 0;
      }
    }

    @media (max-width: 520px) {
      .slider-wrap {
        order: 2;
        flex-basis: 100%;
        min-width: 0;
      }

      .race-heading {
        gap: 8px;
      }

      .race-heading span {
        text-align: right;
      }

      .race-row {
        grid-template-columns: minmax(0, 1fr) minmax(42px, 0.45fr) max-content;
        gap: 5px;
        padding-inline: 4px;
      }

      .race-label {
        gap: 4px;
      }

      .race-track {
        min-width: 0;
      }

      .race-count {
        font-size: 10.5px;
      }
    }

    @media (max-width: 360px) {
      .race-row {
        grid-template-columns: minmax(0, 1fr) minmax(30px, 0.34fr) max-content;
        gap: 4px;
        padding-inline: 3px;
      }

      .race-label,
      .race-count {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="point-tooltip" id="pointTooltip" aria-hidden="true"></div>

  <div class="toolbar" aria-label="controls">
    <div class="select-wrap" title="Field">
      <button id="fieldSelect" class="field-button" type="button" aria-label="Field" aria-haspopup="listbox" aria-expanded="false"></button>
      <div id="fieldOptions" class="field-options" role="listbox" aria-label="Field"></div>
    </div>
    <button id="home" title="Home: center on origin" aria-label="Home: center on origin">
      <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5.5 10.5V20h13v-9.5"></path></svg>
    </button>
    <button id="zoomIn" title="Zoom in" aria-label="Zoom in">
      <svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
    </button>
    <button id="zoomOut" title="Zoom out" aria-label="Zoom out">
      <svg viewBox="0 0 24 24"><path d="M5 12h14"></path></svg>
    </button>
    <button id="edges" class="active" title="Toggle leader-distance edges" aria-label="Toggle leader-distance edges">
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="2"></circle><circle cx="18" cy="6" r="2"></circle><circle cx="12" cy="18" r="2"></circle><path d="M8 6h8"></path><path d="m7 8 4 8"></path><path d="m17 8-4 8"></path></svg>
    </button>
    <button id="points" class="active" title="Toggle points" aria-label="Toggle points">
      <svg viewBox="0 0 24 24"><circle cx="7" cy="7" r="2.2"></circle><circle cx="17" cy="8" r="2.2"></circle><circle cx="12" cy="17" r="2.2"></circle></svg>
    </button>
    <button id="grid" class="active" title="Toggle grid" aria-label="Toggle grid">
      <svg viewBox="0 0 24 24"><path d="M4 8h16"></path><path d="M4 16h16"></path><path d="M8 4v16"></path><path d="M16 4v16"></path></svg>
    </button>
    <div class="slider-wrap" title="Window radius W: larger values admit more points">
      <span id="windowLabel">W=4.0</span>
      <input id="windowRadius" type="range" min="1" max="8" step="0.1" value="4" aria-label="Window radius W">
    </div>
    <button id="save" title="Save PNG" aria-label="Save PNG">
      <svg viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
    </button>
  </div>

  <div class="status" id="status"></div>
  <script src="app.js?v=20260528-equal-distance-labels" defer></script>
</body>
</html>
