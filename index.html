<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dodecagonal Cut-and-Project Explorer</title>
  <style>
    :root {
      --bg: #f8f7f2;
      --ink: #171717;
      --muted: #6b6b68;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-border: rgba(20, 20, 20, 0.16);
      --blue: #2436d8;
      --orange: #f0a000;
      --orange-edge: #b56e00;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: grab;
      touch-action: none;
    }

    #stage.dragging {
      cursor: grabbing;
    }

    .toolbar {
      position: fixed;
      top: 16px;
      left: 16px;
      max-width: calc(100vw - 32px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
      user-select: none;
    }

    .status {
      position: fixed;
      right: 16px;
      bottom: 16px;
      min-width: 260px;
      padding: 10px 12px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      user-select: none;
    }

    .status strong {
      color: var(--ink);
      font-weight: 650;
    }

    button {
      width: 36px;
      height: 36px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      background: #ffffff;
      color: #242424;
      padding: 0;
      cursor: pointer;
    }

    button:hover {
      background: #f0f0ec;
    }

    button.active {
      color: #ffffff;
      background: #22242a;
      border-color: #22242a;
    }

    button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .slider-wrap {
      height: 36px;
      flex: 1 1 clamp(220px, 34vw, 380px);
      min-width: 210px;
      max-width: 430px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      background: #ffffff;
    }

    .slider-wrap span {
      min-width: 42px;
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: auto;
      min-width: 0;
      flex: 1 1 auto;
      accent-color: #22242a;
    }

    @media (max-width: 720px) {
      .toolbar {
        right: 12px;
        left: 12px;
        top: 12px;
        flex-wrap: wrap;
      }

      .slider-wrap {
        flex-basis: 220px;
        max-width: none;
      }

      .status {
        left: 12px;
        right: 12px;
        bottom: 12px;
        min-width: 0;
      }
    }

    @media (max-width: 520px) {
      .slider-wrap {
        order: 2;
        flex-basis: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div class="toolbar" aria-label="controls">
    <button id="home" title="Home: center on origin" aria-label="Home: center on origin">
      <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5.5 10.5V20h13v-9.5"></path></svg>
    </button>
    <button id="zoomIn" title="Zoom in" aria-label="Zoom in">
      <svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
    </button>
    <button id="zoomOut" title="Zoom out" aria-label="Zoom out">
      <svg viewBox="0 0 24 24"><path d="M5 12h14"></path></svg>
    </button>
    <button id="edges" class="active" title="Toggle unit edges" aria-label="Toggle unit edges">
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="2"></circle><circle cx="18" cy="6" r="2"></circle><circle cx="12" cy="18" r="2"></circle><path d="M8 6h8"></path><path d="m7 8 4 8"></path><path d="m17 8-4 8"></path></svg>
    </button>
    <button id="grid" class="active" title="Toggle grid" aria-label="Toggle grid">
      <svg viewBox="0 0 24 24"><path d="M4 8h16"></path><path d="M4 16h16"></path><path d="M8 4v16"></path><path d="M16 4v16"></path></svg>
    </button>
    <div class="slider-wrap" title="Window radius W: larger values admit more points">
      <span id="windowLabel">W 4.0</span>
      <input id="windowRadius" type="range" min="1" max="8" step="0.1" value="4" aria-label="Window radius W">
    </div>
    <button id="save" title="Save PNG" aria-label="Save PNG">
      <svg viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
    </button>
  </div>

  <div class="status" id="status"></div>
  <script src="app.js" defer></script>
</body>
</html>
