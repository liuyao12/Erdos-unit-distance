<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Number-Field Cut-and-Project Explorer</title>
  <style>
    :root {
      --bg: #f8f7f2;
      --ink: #171717;
      --muted: #6b6b68;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-border: rgba(20, 20, 20, 0.16);
      --blue: #2436d8;
      --orange: #f0a000;
      --orange-edge: #b56e00;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    #stage {
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: grab;
      touch-action: none;
    }

    #stage.dragging {
      cursor: grabbing;
    }

    .toolbar {
      position: fixed;
      top: 16px;
      left: 350px;
      max-width: calc(100vw - 366px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
      user-select: none;
    }

    .field-label {
      font-weight: 500;
    }

    .field-label strong,
    .field-heading strong {
      font-weight: 800;
    }

    .field-heading {
      color: var(--ink);
      font-weight: 500;
    }

    .field-degree-inline {
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .field-alias-inline {
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }

    .status {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: max-content;
      min-width: 0;
      max-width: calc(100vw - 32px);
      padding: 8px 10px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
      font-size: 12px;
      line-height: 1.32;
      color: var(--muted);
      user-select: none;
    }

    .status strong {
      color: var(--ink);
      font-weight: 650;
    }

    .status .field-heading strong {
      font-weight: 800;
    }

    .status a {
      color: var(--blue);
      font-weight: 700;
      text-decoration: none;
    }

    .status a:hover {
      text-decoration: underline;
    }

    .status-top {
      display: grid;
      grid-template-columns: max-content 88px 88px;
      gap: 6px;
      align-items: start;
    }

    .status-meta {
      min-width: 0;
      max-width: 180px;
    }

    .status-source {
      display: block;
      overflow: hidden;
      color: var(--ink);
      font-size: 11px;
      font-weight: 650;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-source-note {
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
    }

    .status-measures {
      display: grid;
      gap: 1px;
      margin-top: 2px;
      font-size: 11px;
      line-height: 1.2;
    }

    .lower-bound-card,
    .shown-distance {
      width: 88px;
      min-width: 0;
      max-width: none;
      height: 38px;
      min-height: 38px;
      box-sizing: border-box;
      margin: 0;
      padding: 4px 6px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(20, 20, 20, 0.09);
      border-radius: 5px;
      font-variant-numeric: tabular-nums;
    }

    .status a.lower-bound-card {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      color: var(--ink);
      font-weight: inherit;
      text-decoration: none;
      box-shadow: inset 2px 0 0 var(--blue);
      transition: background 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    .status a.lower-bound-card:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(36, 54, 216, 0.24);
      text-decoration: none;
    }

    .status a.lower-bound-card:focus-visible {
      outline: 2px solid rgba(36, 54, 216, 0.32);
      outline-offset: 2px;
    }

    .lower-bound-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .lower-bound-value {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      color: var(--ink);
      font-size: 10px;
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
    }

    .lower-bound-info {
      flex: 0 0 auto;
      width: 12px;
      height: 12px;
      color: var(--blue);
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .distance-race {
      display: grid;
      width: max-content;
      max-width: 100%;
      gap: 3px;
      margin: 5px 0 0;
    }

    .race-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .race-heading strong {
      color: var(--ink);
      font-weight: 700;
    }

    .race-row {
      position: relative;
      display: flex;
      gap: 5px;
      align-items: center;
      min-height: 16px;
      padding: 1px 3px;
      font-variant-numeric: tabular-nums;
      border: 1px solid transparent;
      border-radius: 5px;
      cursor: pointer;
      transition:
        transform 320ms cubic-bezier(0.2, 0.9, 0.2, 1),
        opacity 220ms ease,
        background 180ms ease,
        border-color 180ms ease,
        box-shadow 180ms ease;
      will-change: transform;
    }

    .race-row:hover {
      background: rgba(20, 20, 20, 0.035);
    }

    .race-row:focus-visible {
      outline: 2px solid rgba(36, 54, 216, 0.32);
      outline-offset: 2px;
    }

    .race-row.entering {
      opacity: 0;
      transform: translateY(8px) scale(0.985);
    }

    .race-row.selected {
      border-color: var(--race-color, #6f7f93);
      background: rgba(255, 255, 255, 0.72);
      box-shadow:
        inset 0 0 0 1px var(--race-color, #6f7f93),
        0 1px 6px rgba(20, 20, 20, 0.07);
    }

    .race-label {
      display: flex;
      align-items: baseline;
      gap: 4px;
      flex: 0 1 116px;
      min-width: 92px;
      max-width: 126px;
      overflow: hidden;
      color: var(--ink);
      font-size: 11px;
      font-weight: 650;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .race-exact {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .race-decimal {
      flex: 0 0 auto;
      color: var(--muted);
      font-weight: 600;
    }

    .race-track {
      flex: 0 0 150px;
      height: 6px;
      min-width: 0;
      overflow: hidden;
      background: rgba(20, 20, 20, 0.11);
      border-radius: 7px;
    }

    .race-fill {
      display: block;
      height: 100%;
      background: var(--race-color, #6f7f93);
      border-radius: 7px;
      transition: width 260ms cubic-bezier(0.2, 0.9, 0.2, 1), background-color 180ms ease;
    }

    .race-row.leader .race-fill {
      box-shadow: 0 0 0 1px rgba(20, 20, 20, 0.08);
    }

    .race-row.unit .race-label::after {
      content: "unit";
      padding: 1px 4px;
      border-radius: 4px;
      background: rgba(36, 54, 216, 0.08);
      color: var(--blue);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .race-count {
      justify-self: end;
      min-width: 28px;
      color: var(--ink);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.1;
      text-align: right;
      white-space: nowrap;
    }

    .race-note {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .shown-distance {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      box-shadow: inset 2px 0 0 var(--race-color, #6f7f93);
    }

    .shown-distance.selected {
      border-color: rgba(20, 20, 20, 0.14);
    }

    .shown-label {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .shown-distance .race-label {
      justify-content: flex-end;
      gap: 4px;
      max-width: 100%;
      font-size: 10px;
      text-align: right;
    }

    .shown-distance .race-decimal {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .race-row,
      .race-fill {
        transition: none;
      }
    }

    .point-tooltip {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 3;
      max-width: min(360px, calc(100vw - 24px));
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.1);
      color: var(--ink);
      opacity: 0;
      pointer-events: none;
      transform: translate(-999px, -999px);
      transition: opacity 80ms ease;
      user-select: none;
      visibility: hidden;
    }

    .point-tooltip.visible {
      opacity: 1;
      visibility: visible;
    }

    .tooltip-field {
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      line-height: 1.15;
    }

    .tooltip-expression {
      font: 600 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      overflow-wrap: anywhere;
    }

    .tooltip-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      line-height: 1.15;
    }

    button {
      width: 36px;
      height: 36px;
      display: inline-grid;
      place-items: center;
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      background: #ffffff;
      color: #242424;
      padding: 0;
      cursor: pointer;
    }

    button:hover {
      background: #f0f0ec;
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    button.active {
      color: #ffffff;
      background: #22242a;
      border-color: #22242a;
    }

    button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .field-panel {
      position: fixed;
      top: 16px;
      bottom: 16px;
      left: 16px;
      z-index: 4;
      width: 318px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(10px);
      user-select: none;
    }

    .field-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .field-panel-title {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
    }

    .field-info {
      flex: 0 0 auto;
      display: grid;
      gap: 3px;
      padding: 7px 8px;
      background: rgba(255, 255, 255, 0.54);
      border: 1px solid rgba(20, 20, 20, 0.08);
      border-radius: 6px;
      line-height: 1.2;
    }

    .field-info-kicker {
      color: var(--muted);
      font-size: 9px;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
    }

    .field-info-main {
      min-width: 0;
      overflow: hidden;
      color: var(--ink);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-panel-close,
    .field-drawer-toggle {
      display: none;
    }

    .field-backdrop {
      position: fixed;
      inset: 0;
      z-index: 7;
      background: rgba(20, 20, 20, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, visibility 180ms ease;
      visibility: hidden;
    }

    .field-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
    }

    .field-poset {
      position: relative;
      flex: 2 1 0;
      min-height: 0;
      overflow: hidden;
    }

    .poset-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .poset-lines path {
      fill: none;
      stroke: rgba(20, 20, 20, 0.2);
      stroke-linecap: round;
      stroke-width: 1.25;
      transition: stroke 160ms ease, stroke-width 160ms ease, opacity 160ms ease;
      vector-effect: non-scaling-stroke;
    }

    .poset-lines path.selected-down {
      opacity: 1;
      stroke: rgba(36, 54, 216, 0.72);
      stroke-width: 2.2;
    }

    .degree-marker {
      position: absolute;
      left: 2px;
      top: var(--y);
      z-index: 0;
      width: 48px;
      transform: translateY(-50%);
      color: rgba(20, 20, 20, 0.42);
      font-size: 9px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
      pointer-events: none;
      text-align: left;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .field-node {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 1;
      width: auto;
      min-width: 0;
      min-height: 30px;
      height: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 7px;
      transform: translate(-50%, -50%);
      color: #242424;
      font: 500 11px/1.05 Inter, ui-sans-serif, system-ui, sans-serif;
      text-align: center;
      white-space: nowrap;
    }

    .field-node:hover:not(:disabled) {
      background: #f0f0ec;
    }

    .field-node:focus-visible {
      outline: 2px solid rgba(36, 54, 216, 0.4);
      outline-offset: 2px;
    }

    .field-node.selected {
      color: #ffffff;
      background: #22242a;
      border-color: #22242a;
      box-shadow: 0 4px 12px rgba(20, 20, 20, 0.14);
    }

    .field-node:disabled {
      width: auto;
      min-height: 28px;
      padding-inline: 10px;
      color: var(--ink);
      background: #f4f3ee;
      cursor: default;
      opacity: 1;
    }

    .lattice-panel {
      flex: 1 1 0;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      padding-top: 8px;
      border-top: 1px solid rgba(20, 20, 20, 0.09);
    }

    .lattice-panel-title {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
      text-transform: uppercase;
    }

    .lattice-options {
      position: relative;
      flex: 1 1 auto;
      min-height: 52px;
      overflow: visible;
    }

    .lattice-options.moser-diagram {
      min-height: 176px;
    }

    .lattice-lines {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .lattice-lines path {
      fill: none;
      stroke: rgba(20, 20, 20, 0.22);
      stroke-linecap: round;
      stroke-width: 1.2;
      transition: stroke 160ms ease, stroke-width 160ms ease, opacity 160ms ease;
      vector-effect: non-scaling-stroke;
    }

    .lattice-lines path.selected-lattice {
      stroke: rgba(36, 54, 216, 0.7);
      stroke-width: 2;
    }

    .lattice-option {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 1;
      width: auto;
      max-width: calc(100% - 14px);
      height: auto;
      min-height: 38px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      justify-items: start;
      gap: 3px;
      padding: 6px 7px;
      border-radius: 6px;
      text-align: left;
      transform: translate(-50%, -50%);
    }

    .lattice-option.selected {
      color: #ffffff;
      background: #22242a;
      border-color: #22242a;
    }

    .lattice-ambient {
      position: absolute;
      left: var(--x);
      top: var(--y);
      z-index: 1;
      width: auto;
      max-width: calc(100% - 14px);
      min-height: 30px;
      display: grid;
      gap: 2px;
      padding: 5px 8px;
      transform: translate(-50%, -50%);
      color: var(--ink);
      background: #f4f3ee;
      border: 1px solid rgba(20, 20, 20, 0.12);
      border-radius: 6px;
      text-align: center;
    }

    .lattice-name,
    .lattice-note {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lattice-name {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.05;
    }

    .lattice-note {
      color: var(--muted);
      font-size: 9.5px;
      font-weight: 600;
      line-height: 1.05;
    }

    .lattice-option.selected .lattice-note {
      color: rgba(255, 255, 255, 0.72);
    }

    .lattice-ambient .lattice-name,
    .lattice-ambient .lattice-note {
      text-align: center;
    }

    .status-lattice {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .slider-wrap {
      height: 36px;
      flex: 1 1 clamp(220px, 34vw, 380px);
      min-width: 210px;
      max-width: 430px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border: 1px solid rgba(20, 20, 20, 0.18);
      border-radius: 6px;
      background: #ffffff;
    }

    .slider-wrap span {
      min-width: 42px;
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .slider-wrap span sub {
      font-size: 72%;
      line-height: 0;
    }

    .slider-wrap.full-ring {
      flex: 0 0 auto;
      min-width: 82px;
    }

    .slider-wrap.full-ring span {
      min-width: auto;
      color: var(--ink);
      font-weight: 650;
    }

    .slider-wrap.full-ring input[type="range"] {
      display: none;
    }

    input[type="range"] {
      width: auto;
      min-width: 0;
      flex: 1 1 auto;
      accent-color: #22242a;
    }

    @media (max-width: 900px) {
      .toolbar {
        left: 314px;
        max-width: calc(100vw - 326px);
      }

      .field-panel {
        width: 286px;
      }

      .field-node {
        font-size: 10.5px;
      }
    }

    @media (max-width: 720px) {
      .toolbar {
        right: 12px;
        left: 12px;
        top: 12px;
        flex-wrap: wrap;
        max-width: none;
      }

      .field-drawer-toggle {
        display: inline-grid;
      }

      .slider-wrap {
        flex-basis: 220px;
        max-width: none;
      }

      .field-panel {
        top: 0;
        right: auto;
        bottom: 0;
        left: 0;
        z-index: 8;
        width: min(340px, 86vw);
        height: auto;
        padding: 10px;
        border-radius: 0 8px 8px 0;
        transform: translateX(-105%);
        transition: transform 180ms ease;
        visibility: hidden;
      }

      .field-panel.open {
        transform: translateX(0);
        visibility: visible;
      }

      .field-panel-close {
        width: 30px;
        height: 30px;
        display: inline-grid;
      }

      .field-poset {
        min-height: 0;
      }

      .field-node {
        min-height: 25px;
        padding: 3px 7px;
        font-size: 9.5px;
      }

      .lattice-option {
        min-height: 34px;
        padding: 5px 6px;
      }

      .status {
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
        min-width: 0;
      }
    }

    @media (max-width: 520px) {
      .slider-wrap {
        order: 2;
        flex-basis: 100%;
        min-width: 0;
      }

      .race-heading {
        gap: 8px;
      }

      .race-heading span {
        text-align: right;
      }

      .race-row {
        gap: 5px;
        padding-inline: 4px;
      }

      .race-label {
        flex-basis: 88px;
        min-width: 76px;
        max-width: 104px;
        gap: 4px;
      }

      .race-track {
        flex-basis: 86px;
      }

      .race-count {
        font-size: 10.5px;
      }
    }

    @media (max-width: 360px) {
      .race-row {
        gap: 4px;
        padding-inline: 3px;
      }

      .race-label {
        flex-basis: 76px;
        min-width: 64px;
        max-width: 88px;
        font-size: 10px;
      }

      .race-track {
        flex-basis: 70px;
      }

      .race-count {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="point-tooltip" id="pointTooltip" aria-hidden="true"></div>
  <div id="fieldBackdrop" class="field-backdrop" aria-hidden="true"></div>

  <aside class="field-panel" aria-label="number field poset">
    <div class="field-panel-header">
      <div class="field-panel-title">Fields</div>
      <button id="fieldPanelClose" class="field-panel-close" type="button" title="Close fields" aria-label="Close fields">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12"></path><path d="M18 6 6 18"></path></svg>
      </button>
    </div>
    <div id="fieldInfo" class="field-info"></div>
    <div id="fieldPoset" class="field-poset"></div>
    <div class="lattice-panel" aria-label="ring or lattice selector">
      <div class="lattice-panel-title">Rings / Lattices</div>
      <div id="latticeOptions" class="lattice-options"></div>
    </div>
  </aside>

  <div class="toolbar" aria-label="controls">
    <button id="fieldPanelToggle" class="field-drawer-toggle" title="Fields" aria-label="Fields" aria-expanded="false">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"></circle><circle cx="6" cy="13" r="2"></circle><circle cx="18" cy="13" r="2"></circle><circle cx="12" cy="20" r="2"></circle><path d="M11 6.6 7.2 11.4"></path><path d="m13 6.6 3.8 4.8"></path><path d="M7.8 14.5 11 18.2"></path><path d="m16.2 14.5-3.2 3.7"></path></svg>
    </button>
    <button id="home" title="Home: center on origin" aria-label="Home: center on origin">
      <svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5.5 10.5V20h13v-9.5"></path></svg>
    </button>
    <button id="zoomIn" title="Zoom in" aria-label="Zoom in">
      <svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
    </button>
    <button id="zoomOut" title="Zoom out" aria-label="Zoom out">
      <svg viewBox="0 0 24 24"><path d="M5 12h14"></path></svg>
    </button>
    <button id="edges" class="active" title="Toggle leader-distance edges" aria-label="Toggle leader-distance edges">
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="2"></circle><circle cx="18" cy="6" r="2"></circle><circle cx="12" cy="18" r="2"></circle><path d="M8 6h8"></path><path d="m7 8 4 8"></path><path d="m17 8-4 8"></path></svg>
    </button>
    <button id="tiles" class="active" title="Toggle cyclotomic square-face rhombs" aria-label="Toggle cyclotomic square-face rhombs">
      <svg viewBox="0 0 24 24"><path d="M4.5 8.5 11 5l6.5 3.5L11 12z"></path><path d="M4.5 8.5 11 12v7L4.5 15.5z"></path><path d="M17.5 8.5 11 12v7l6.5-3.5z"></path></svg>
    </button>
    <button id="points" class="active" title="Toggle points" aria-label="Toggle points">
      <svg viewBox="0 0 24 24"><circle cx="7" cy="7" r="2.2"></circle><circle cx="17" cy="8" r="2.2"></circle><circle cx="12" cy="17" r="2.2"></circle></svg>
    </button>
    <button id="grid" class="active" title="Toggle grid" aria-label="Toggle grid">
      <svg viewBox="0 0 24 24"><path d="M4 8h16"></path><path d="M4 16h16"></path><path d="M8 4v16"></path><path d="M16 4v16"></path></svg>
    </button>
    <div class="slider-wrap" title="Window radius W: larger values admit more points">
      <span id="windowLabel">W=4.0</span>
      <input id="windowRadius" type="range" min="1" max="8" step="0.1" value="4" aria-label="Window radius W">
    </div>
    <button id="save" title="Save PNG" aria-label="Save PNG">
      <svg viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
    </button>
    <button id="saveSvg" title="Save SVG of lens" aria-label="Save SVG of lens">
      <svg viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6z"></path><path d="M14 3v5h5"></path><circle cx="10" cy="14" r="1.6"></circle><circle cx="15" cy="17" r="1.6"></circle><path d="m11.3 15 2.4 1.3"></path></svg>
    </button>
  </div>

  <div class="status" id="status"></div>
  <script src="unit_distance_bounds.js?v=20260529-derived-rules"></script>
  <script src="app.js?v=20260602-cyclotomic-rhombs" defer></script>
</body>
</html>
